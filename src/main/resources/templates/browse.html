<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'Browse — Scan #' + ${scan.id}">Browse</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #f0f2f5; }
        .path-cell { max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .badge-dir  { background: #6366f1; }
        .badge-file { background: #10b981; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Navbar -->
<nav class="navbar navbar-dark shadow-sm" style="background:linear-gradient(135deg,#1a1a2e 0%,#0f3460 100%)">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" class="me-2">
                <rect width="28" height="28" rx="6" fill="#e94560"/>
                <path d="M5 8h18M5 13h12M5 18h14M5 23h9" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <circle cx="21" cy="20" r="5" fill="#f59e0b"/>
                <path d="M19 20h4M21 18v4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            FileScanner
        </a>
        <div class="d-flex gap-2">
            <a href="/" class="btn btn-sm btn-outline-light"><i class="bi bi-house-fill me-1"></i>Home</a>
            <a th:href="@{/dashboard/{id}(id=${scan.id})}" class="btn btn-sm btn-outline-light">
                <i class="bi bi-bar-chart-fill me-1"></i>Dashboard
            </a>
            <a th:href="@{/audit(path=${currentPath})}" class="btn btn-sm btn-outline-light">
                <i class="bi bi-shield-check me-1"></i>Audit
            </a>
            <a href="/query" class="btn btn-sm btn-warning fw-semibold">
                <i class="bi bi-stars me-1"></i>AI Query
            </a>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 py-4 flex-grow-1">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">Home</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/dashboard/{id}(id=${scan.id})}">Dashboard #<span th:text="${scan.id}"></span></a>
            </li>
            <li th:each="crumb,iter : ${breadcrumbs}"
                th:class="${iter.last} ? 'breadcrumb-item active' : 'breadcrumb-item'">
                <a th:unless="${iter.last}"
                   th:href="@{/browse/{id}(id=${scan.id},path=${crumb[1]})}"
                   th:text="${crumb[0]}"></a>
                <span th:if="${iter.last}" th:text="${crumb[0]}"></span>
            </li>
        </ol>
    </nav>

    <div class="d-flex align-items-center justify-content-between mb-3">
        <h4 class="fw-bold mb-0">
            <i class="bi bi-folder2-open me-2 text-warning"></i>
            <code class="fs-6 text-dark" th:text="${currentPath}"></code>
        </h4>
    </div>

    <!-- Search -->
    <form th:action="@{/browse/{id}(id=${scan.id})}" method="get" class="mb-3">
        <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
            <input type="text" class="form-control" name="search"
                   placeholder="Search by path fragment…" th:value="${search}">
            <button class="btn btn-outline-primary" type="submit">Search</button>
            <a th:href="@{/browse/{id}(id=${scan.id})}" class="btn btn-outline-secondary">Clear</a>
        </div>
    </form>

    <!-- File table -->
    <div class="card shadow-sm rounded-4">
        <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center pt-3">
            <span class="fw-semibold">
                <span th:text="${entries.totalElements}"></span> entries
                <span th:if="${search != null and !#strings.isEmpty(search)}"
                      class="text-muted small"> matching "<span th:text="${search}"></span>"</span>
            </span>
            <span class="text-muted small">
                Page <span th:text="${entries.number + 1}"></span> of <span th:text="${entries.totalPages}"></span>
            </span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-sm table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th style="width:60px">Type</th>
                            <th>Name</th>
                            <th style="width:80px">Ext</th>
                            <th style="width:100px">Size</th>
                            <th style="width:160px">Last Modified</th>
                            <th style="width:60px">Depth</th>
                        </tr>
                    </thead>
                    <tbody>
                    <tr th:each="entry : ${entries.content}">
                        <td>
                            <span th:if="${entry.directory}"
                                  class="badge badge-dir"><i class="bi bi-folder-fill"></i> DIR</span>
                            <span th:unless="${entry.directory}"
                                  class="badge badge-file"><i class="bi bi-file-earmark"></i> FILE</span>
                        </td>
                        <td class="path-cell" th:title="${entry.fullPath}">
                            <a th:if="${entry.directory}"
                               th:href="@{/browse/{id}(id=${scan.id},path=${entry.fullPath})}"
                               class="text-decoration-none fw-semibold"
                               th:text="${entry.name}"></a>
                            <span th:unless="${entry.directory}" th:text="${entry.name}"></span>
                        </td>
                        <td>
                            <span th:if="${entry.extension != null}"
                                  class="badge bg-light text-dark border small"
                                  th:text="${entry.extension}"></span>
                            <span th:unless="${entry.extension != null}" class="text-muted">—</span>
                        </td>
                        <td class="text-end font-monospace small"
                            th:text="${entry.directory ? '—' : T(com.filescanner.dto.StatsDto).formatBytes(entry.sizeBytes)}"></td>
                        <td class="text-muted small"
                            th:text="${#temporals.format(entry.lastModified,'yyyy-MM-dd HH:mm')}"></td>
                        <td class="text-center text-muted" th:text="${entry.depth}"></td>
                    </tr>
                    <tr th:if="${entries.totalElements == 0}">
                        <td colspan="6" class="text-center text-muted py-4">No entries found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="card-footer bg-white border-0 pb-3" th:if="${entries.totalPages > 1}">
            <nav>
                <ul class="pagination pagination-sm justify-content-center mb-0">
                    <li th:class="${entries.first} ? 'page-item disabled' : 'page-item'">
                        <a class="page-link"
                           th:href="@{/browse/{id}(id=${scan.id},path=${currentPath},search=${search},page=${entries.number - 1})}">
                            &laquo; Prev
                        </a>
                    </li>
                    <li class="page-item disabled">
                        <span class="page-link">
                            <span th:text="${entries.number + 1}"></span> / <span th:text="${entries.totalPages}"></span>
                        </span>
                    </li>
                    <li th:class="${entries.last} ? 'page-item disabled' : 'page-item'">
                        <a class="page-link"
                           th:href="@{/browse/{id}(id=${scan.id},path=${currentPath},search=${search},page=${entries.number + 1})}">
                            Next &raquo;
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</div>

<!-- Footer -->
<footer class="bg-dark text-center py-3 mt-auto">
    <span class="text-white-50 small">
        <svg width="13" height="13" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" class="me-1 mb-1">
            <rect width="28" height="28" rx="6" fill="#e94560"/>
            <path d="M5 8h18M5 13h12M5 18h14M5 23h9" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        FileScanner &copy; 2026 &mdash; Powered by Spring Boot &amp; Claude AI
    </span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

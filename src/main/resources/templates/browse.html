<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head(title='Browse')}"></head>
<body>
<div class="app-layout">

  <th:block th:replace="~{fragments/sidebar :: sidebar(active='browse')}"></th:block>

  <div class="app-main">
    <div class="topbar">
      <div>
        <h1 class="topbar-title">Browse Files</h1>
        <p class="topbar-sub">
          Scan #<span th:text="${scan.id}"></span>
          · <span th:text="${entries.totalElements}"></span> entries
        </p>
      </div>
      <div class="topbar-actions">
        <a th:href="@{/dashboard/{id}(id=${scan.id})}" class="btn btn-ghost btn-sm">Dashboard</a>
        <a href="/query" class="btn btn-primary btn-sm">AI Query</a>
      </div>
    </div>

    <!-- Breadcrumb + search bar (sticky sub-header) -->
    <div style="padding:12px 32px;background:var(--canvas);border-bottom:1px solid var(--border);">
      <ol class="breadcrumb" style="margin-bottom:10px;">
        <li class="breadcrumb-item"><a href="/">Home</a></li>
        <li class="breadcrumb-sep">›</li>
        <li class="breadcrumb-item">
          <a th:href="@{/dashboard/{id}(id=${scan.id})}"
             th:text="'Scan #' + ${scan.id}"></a>
        </li>
        <th:block th:each="crumb,iter : ${breadcrumbs}">
          <li class="breadcrumb-sep">›</li>
          <li th:class="${iter.last} ? 'breadcrumb-item active' : 'breadcrumb-item'">
            <a th:unless="${iter.last}"
               th:href="@{/browse/{id}(id=${scan.id},path=${crumb[1]})}"
               th:text="${crumb[0]}"></a>
            <span th:if="${iter.last}" th:text="${crumb[0]}"></span>
          </li>
        </th:block>
      </ol>

      <form th:action="@{/browse/{id}(id=${scan.id})}" method="get">
        <div style="display:flex;gap:10px;align-items:center;">
          <div class="search-wrap" style="flex:1;max-width:420px;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" name="search" class="search-input"
                   placeholder="Search files and folders…"
                   th:value="${search}">
          </div>
          <button type="submit" class="btn btn-ghost btn-sm">Search</button>
          <a th:href="@{/browse/{id}(id=${scan.id})}" class="btn btn-ghost btn-sm">Clear</a>
        </div>
      </form>
    </div>

    <div class="app-content screen-enter" style="padding-top:16px;">
      <div class="card" style="padding:0;">

        <!-- Table header row -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);">
          <span style="font-size:12px;font-weight:600;color:var(--text-muted);">
            <span th:text="${entries.totalElements}"></span> entries
            <span th:if="${search != null and !#strings.isEmpty(search)}"
                  style="color:var(--text-muted);">
              matching "<span th:text="${search}"></span>"
            </span>
          </span>
          <span style="font-size:12px;color:var(--text-muted);">
            Page <span th:text="${entries.number + 1}"></span>
            of <span th:text="${entries.totalPages}"></span>
          </span>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th style="width:70px;">Type</th>
              <th>Name</th>
              <th style="width:90px;">Ext</th>
              <th style="width:110px;">Size</th>
              <th style="width:160px;">Last Modified</th>
              <th style="width:70px;">Depth</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="entry : ${entries.content}">
              <td>
                <span th:if="${entry.directory}"   class="badge badge-dir">DIR</span>
                <span th:unless="${entry.directory}" class="badge badge-success">FILE</span>
              </td>
              <td>
                <div style="display:flex;align-items:center;gap:8px;">
                  <!-- Folder icon -->
                  <svg th:if="${entry.directory}" width="15" height="15" viewBox="0 0 24 24" fill="none"
                       stroke="oklch(50% 0.18 270)" stroke-width="2">
                    <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                  </svg>
                  <!-- File icon -->
                  <svg th:unless="${entry.directory}" width="15" height="15" viewBox="0 0 24 24" fill="none"
                       stroke="var(--text-light)" stroke-width="2">
                    <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                    <polyline points="13 2 13 9 20 9"/>
                  </svg>

                  <a th:if="${entry.directory}"
                     th:href="@{/browse/{id}(id=${scan.id},path=${entry.fullPath})}"
                     style="font-family:var(--font-mono);font-size:13px;font-weight:600;text-decoration:none;color:var(--text);"
                     th:text="${entry.name}"></a>
                  <span th:unless="${entry.directory}"
                        style="font-family:var(--font-mono);font-size:13px;"
                        th:text="${entry.name}"></span>
                </div>
              </td>
              <td>
                <span th:if="${entry.extension != null}" class="badge badge-accent mono"
                      th:text="${entry.extension}"></span>
                <span th:unless="${entry.extension != null}" style="color:var(--text-light);">—</span>
              </td>
              <td style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted);"
                  th:text="${entry.directory ? '—' : T(com.filescanner.dto.StatsDto).formatBytes(entry.sizeBytes)}"></td>
              <td style="font-size:12px;color:var(--text-muted);"
                  th:text="${#temporals.format(entry.lastModified,'yyyy-MM-dd HH:mm')}"></td>
              <td>
                <span style="background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-size:11px;font-family:var(--font-mono);color:var(--text-muted);"
                      th:text="${entry.depth}"></span>
              </td>
            </tr>
            <tr th:if="${entries.totalElements == 0}">
              <td colspan="6" style="text-align:center;padding:48px;color:var(--text-muted);">No entries found.</td>
            </tr>
          </tbody>
        </table>

        <!-- Pagination -->
        <div class="pagination" th:if="${entries.totalPages > 1}">
          <span class="page-info">
            Page <span th:text="${entries.number + 1}"></span>
            of <span th:text="${entries.totalPages}"></span>
          </span>
          <div style="display:flex;gap:6px;">
            <a th:class="${entries.first} ? 'btn btn-ghost btn-sm' : 'btn btn-ghost btn-sm'"
               th:style="${entries.first} ? 'opacity:0.4;pointer-events:none;' : ''"
               th:href="@{/browse/{id}(id=${scan.id},path=${currentPath},search=${search},page=${entries.number - 1})}">
              ← Prev
            </a>
            <a th:class="${entries.last} ? 'btn btn-ghost btn-sm' : 'btn btn-ghost btn-sm'"
               th:style="${entries.last} ? 'opacity:0.4;pointer-events:none;' : ''"
               th:href="@{/browse/{id}(id=${scan.id},path=${currentPath},search=${search},page=${entries.number + 1})}">
              Next →
            </a>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head(title='Browse')}"></head>
<body>
<div class="app-layout">

  <th:block th:replace="~{fragments/sidebar :: sidebar(active='cloud')}"></th:block>

  <div class="app-main">
    <div class="topbar">
      <div>
        <h1 class="topbar-title" th:text="'Browse · ' + ${account.displayName}">Browse</h1>
        <p class="topbar-sub">
          <span th:text="${account.provider == 'ONEDRIVE' ? 'OneDrive' : 'Google Drive'}"></span>
          · <span th:text="${entries.totalElements}"></span> entries
        </p>
      </div>
      <div class="topbar-actions">
        <a th:href="@{/cloud/{id}(id=${account.id})}" class="btn btn-ghost btn-sm">← Stats</a>
        <a th:href="@{/cloud/{id}/duplicates(id=${account.id})}" class="btn btn-ghost btn-sm" style="color:var(--danger);">Duplicates</a>
      </div>
    </div>

    <!-- Breadcrumb + search (sticky sub-header) -->
    <div style="padding:12px 32px;background:var(--canvas);border-bottom:1px solid var(--border);">
      <ol class="breadcrumb" style="margin-bottom:10px;">
        <li class="breadcrumb-item"><a href="/cloud">Cloud</a></li>
        <li class="breadcrumb-sep">›</li>
        <li class="breadcrumb-item">
          <a th:href="@{/cloud/{id}(id=${account.id})}" th:text="${account.displayName}"></a>
        </li>
        <th:block th:each="crumb,iter : ${breadcrumbs}">
          <li class="breadcrumb-sep">›</li>
          <li th:class="${iter.last} ? 'breadcrumb-item active' : 'breadcrumb-item'">
            <a th:unless="${iter.last}"
               th:href="@{/cloud/{id}/browse(id=${account.id},path=${crumb[1]})}"
               th:text="${crumb[0]}"></a>
            <span th:if="${iter.last}" th:text="${crumb[0]}"></span>
          </li>
        </th:block>
      </ol>

      <form th:action="@{/cloud/{id}/browse(id=${account.id})}" method="get">
        <div style="display:flex;gap:10px;align-items:center;">
          <div class="search-wrap" style="flex:1;max-width:420px;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" name="search" class="search-input"
                   placeholder="Search files and folders…"
                   th:value="${search}">
          </div>
          <button type="submit" class="btn btn-ghost btn-sm">Search</button>
          <a th:href="@{/cloud/{id}/browse(id=${account.id})}" class="btn btn-ghost btn-sm">Clear</a>
        </div>
      </form>
    </div>

    <div class="app-content screen-enter" style="padding-top:16px;">

      <!-- Search notice -->
      <div th:if="${search != null and !#strings.isEmpty(search)}"
           style="background:oklch(95% 0.05 245);border:1px solid oklch(80% 0.1 245);border-radius:10px;padding:10px 16px;margin-bottom:16px;font-size:13px;color:oklch(35% 0.17 245);">
        Showing results for "<strong th:text="${search}"></strong>" —
        <span th:text="${entries.totalElements}"></span> items found
      </div>

      <div class="card" style="padding:0;">

        <!-- Table header -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);">
          <span style="font-size:12px;font-weight:600;color:var(--text-muted);">
            <span th:text="${entries.totalElements}"></span> entries
          </span>
          <span style="font-size:12px;color:var(--text-muted);">
            Page <span th:text="${entries.number + 1}"></span>
            of <span th:text="${entries.totalPages}"></span>
          </span>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th style="width:70px;">Type</th>
              <th>Name</th>
              <th style="width:90px;">Ext</th>
              <th style="width:110px;">Size</th>
              <th style="width:160px;">Last Modified</th>
              <th style="width:50px;"></th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="entry : ${entries.content}">
              <td>
                <span th:if="${entry.directory}"   class="badge badge-dir">DIR</span>
                <span th:unless="${entry.directory}" class="badge badge-success">FILE</span>
              </td>
              <td>
                <div style="display:flex;align-items:center;gap:8px;">
                  <svg th:if="${entry.directory}" width="15" height="15" viewBox="0 0 24 24" fill="none"
                       stroke="oklch(50% 0.18 270)" stroke-width="2">
                    <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                  </svg>
                  <svg th:unless="${entry.directory}" width="15" height="15" viewBox="0 0 24 24" fill="none"
                       stroke="var(--text-light)" stroke-width="2">
                    <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                    <polyline points="13 2 13 9 20 9"/>
                  </svg>
                  <a th:if="${entry.directory and search == null}"
                     th:href="@{/cloud/{id}/browse(id=${account.id},path=${entry.fullPath})}"
                     style="font-family:var(--font-mono);font-size:13px;font-weight:600;text-decoration:none;color:var(--text);"
                     th:text="${entry.name}"></a>
                  <span th:unless="${entry.directory and search == null}"
                        style="font-family:var(--font-mono);font-size:13px;"
                        th:text="${entry.name}"></span>
                </div>
                <div th:if="${search != null and !#strings.isEmpty(search)}"
                     class="mono" style="font-size:10px;color:var(--text-muted);margin-left:23px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                     th:title="${entry.parentPath}" th:text="${entry.parentPath}"></div>
              </td>
              <td>
                <span th:if="${entry.extension != null}" class="badge badge-accent mono"
                      th:text="${entry.extension}"></span>
                <span th:unless="${entry.extension != null}" style="color:var(--text-light);">—</span>
              </td>
              <td style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted);"
                  th:text="${entry.directory ? '—' : T(com.filescanner.dto.StatsDto).formatBytes(entry.sizeBytes ?: 0)}"></td>
              <td style="font-size:12px;color:var(--text-muted);"
                  th:text="${entry.lastModified != null ? #temporals.format(entry.lastModified,'yyyy-MM-dd HH:mm') : '—'}"></td>
              <td>
                <a th:if="${entry.webUrl != null}" th:href="${entry.webUrl}" target="_blank"
                   class="btn btn-ghost btn-sm" title="Open in cloud">↗</a>
              </td>
            </tr>
            <tr th:if="${entries.totalElements == 0}">
              <td colspan="6" style="text-align:center;padding:48px;color:var(--text-muted);">
                <span th:text="${search != null ? 'No files match your search.' : 'This folder is empty.'}"></span>
              </td>
            </tr>
          </tbody>
        </table>

        <!-- Pagination -->
        <div class="pagination" th:if="${entries.totalPages > 1}">
          <span class="page-info">
            Page <span th:text="${entries.number + 1}"></span>
            of <span th:text="${entries.totalPages}"></span>
          </span>
          <div style="display:flex;gap:6px;">
            <a th:style="${entries.first} ? 'opacity:0.4;pointer-events:none;' : ''"
               class="btn btn-ghost btn-sm"
               th:href="${search != null}
                 ? @{/cloud/{id}/browse(id=${account.id},search=${search},page=${entries.number - 1})}
                 : @{/cloud/{id}/browse(id=${account.id},path=${currentPath},page=${entries.number - 1})}">
              ← Prev
            </a>
            <a th:style="${entries.last} ? 'opacity:0.4;pointer-events:none;' : ''"
               class="btn btn-ghost btn-sm"
               th:href="${search != null}
                 ? @{/cloud/{id}/browse(id=${account.id},search=${search},page=${entries.number + 1})}
                 : @{/cloud/{id}/browse(id=${account.id},path=${currentPath},page=${entries.number + 1})}">
              Next →
            </a>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
</body>
</html>

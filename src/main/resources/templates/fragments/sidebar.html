<!DOCTYPE html>
<!--
  SIDEBAR FRAGMENT — include in every template with:
  <th:block th:replace="~{fragments/sidebar :: sidebar(active='home')}"></th:block>
  
  active values: home, dashboard, browse, query, cloud, audit, duplicates
-->
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<aside class="app-sidebar" th:fragment="sidebar(active)">
  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <span class="sidebar-logo-text">FileScanner</span>
  </div>

  <!-- Nav -->
  <nav class="sidebar-nav">
    <a href="/" th:classappend="${active == 'home'} ? ' active' : ''" class="nav-item">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </a>

    <a th:href="${scan != null ? '/dashboard/' + scan.id : '#'}"
       th:classappend="${active == 'dashboard'} ? ' active' : ''" class="nav-item">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span>Dashboard</span>
    </a>

    <a th:href="${scan != null ? '/browse/' + scan.id : '#'}"
       th:classappend="${active == 'browse'} ? ' active' : ''" class="nav-item">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      </svg>
      <span>Browse</span>
    </a>

    <a href="/query" th:classappend="${active == 'query'} ? ' active' : ''" class="nav-item">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <span>AI Query</span>
      <span class="nav-badge">AI</span>
    </a>

    <a href="/cloud" th:classappend="${active == 'cloud'} ? ' active' : ''" class="nav-item">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
      </svg>
      <span>Cloud</span>
    </a>

    <a href="/audit" th:classappend="${active == 'audit'} ? ' active' : ''" class="nav-item">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span>Audit</span>
    </a>

    <a th:href="${scan != null ? '/duplicates/' + scan.id : '/duplicates'}"
       th:classappend="${active == 'duplicates'} ? ' active' : ''" class="nav-item">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="8" y="8" width="12" height="12" rx="2"/>
        <path d="M4 16V4a2 2 0 0 1 2-2h12"/>
      </svg>
      <span>Duplicates</span>
    </a>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <a href="/h2-console" target="_blank" class="nav-item" style="font-size:11px; color:rgba(255,255,255,0.25);">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <ellipse cx="12" cy="5" rx="9" ry="3"/>
        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
      </svg>
      <span>H2 Console</span>
    </a>
  </div>
</aside>
</body>
</html>

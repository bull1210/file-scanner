server.port=8080

# H2 Persistent File Database
spring.datasource.url=jdbc:h2:file:./filedb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true

# Anthropic API
anthropic.api.key=${ANTHROPIC_API_KEY:change-me}
anthropic.model=claude-sonnet-4-6
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.max.tokens=1024

# Scanner settings
scanner.max.depth=50
scanner.batch.size=500

# Cloud Storage OAuth
cloud.oauth.redirect-base=http://localhost:8080
cloud.sync.batch-size=500

# Thymeleaf
spring.thymeleaf.cache=false
